<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Phishing Email Detector</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
width:500px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:14px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
margin-top:15px;
padding:12px;
font-size:16px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
padding:15px;
border-radius:6px;
display:none;
}

.safe{
background:#d4edda;
color:#155724;
}

.phishing{
background:#f8d7da;
color:#721c24;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Phishing Email Detector</h2>

<textarea id="emailText" placeholder="Paste email content here..."></textarea>

<button onclick="analyzeEmail()">Analyze Email</button>

<div id="resultBox" class="result"></div>

</div>

<script>

async function analyzeEmail(){

let email = document.getElementById("emailText").value;

if(email.trim() === ""){
alert("Please enter email content");
return;
}

let response = await fetch(
"https://ai-phishing-email-detector-mhtd.onrender.com/analyze-email",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email_text: email
})
});

let data = await response.json();

let resultBox = document.getElementById("resultBox");

resultBox.style.display="block";

let resultHTML = `
<b>Prediction:</b> ${data.prediction} <br>
<b>Risk Score:</b> ${data.risk_score} <br>
<b>ML Probability:</b> ${data.ml_probability} <br>
<b>URLs Found:</b> ${data.num_urls}
`;

resultBox.innerHTML = resultHTML;

if(data.prediction === "PHISHING"){
resultBox.className="result phishing";
}else{
resultBox.className="result safe";
}

}

</script>

</body>
</html>
